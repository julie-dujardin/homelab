version: '3.8'

services:
  overseerr:
    image: sctx/overseerr:latest
    container_name: overseerr
    hostname: overseerr
    environment:
      - LOG_LEVEL=debug
      - TZ=Europe/Paris
    ports:
      - 5055:5055
    volumes:
      - /var/lib/ilus/overseerr:/app/config
    restart: unless-stopped
    networks:
      - media

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:develop
    container_name: prowlarr
    hostname: prowlarr
    environment:
      - PUID=1000
      - PGID=998
      - TZ=Europe/Paris
    volumes:
      - /var/lib/ilus/prowlarr:/config
    ports:
      - 9696:9696
    restart: unless-stopped
    networks:
      - media

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
      - PUID=1000
      - PGID=998
      - TZ=Europe/Paris
    restart: unless-stopped
    networks:
      - media

  sonarr:
    image: linuxserver/sonarr:latest
    container_name: sonarr
    hostname: sonarr
    environment:
      - PUID=1000
      - PGID=998
      - TZ=Europe/Paris
    volumes:
      - /var/lib/ilus/sonarr:/config
      - /mnt/storage:/storage
    ports:
      - 8989:8989
    restart: unless-stopped
    networks:
      - media

  radarr:
    image: linuxserver/radarr:nightly
    container_name: radarr
    hostname: radarr
    environment:
      - PUID=1000
      - PGID=998
      - TZ=Europe/Paris
    volumes:
      - /var/lib/ilus/radarr:/config
      - /mnt/storage:/storage
    ports:
      - 7878:7878
    restart: unless-stopped
    networks:
      - media

  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    hostname: jellyfin
    user: 1000:998
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    volumes:
      - /var/lib/ilus/jellyfin:/config
      - /temp/ilus/jellyfin:/cache
      - type: bind
        source: /mnt/storage/media
        target: /media
    restart: 'unless-stopped'
    environment:
      - JELLYFIN_PublishedServerUrl=http://jellyfin.ilus.com
    networks:
      - media

  plex:
    container_name: plex
    hostname: plex
    image: plexinc/pms-docker
    environment:
      - TZ=Europe/Paris
      - PLEX_CLAIM=claim-FMx_6B38vs3uz-95a-Le
    network_mode: host
    volumes:
      - /var/lib/ilus/plex:/config
      - /mnt/storage/media:/raid/media
      - type: tmpfs  # transcode video to ram to save disk IO
        target: /transcode
        tmpfs:
          size: 4G
      - type: tmpfs  # transcode audio to ram to save disk IO
        target: /tmp
        tmpfs:
          size: 2G
    restart: unless-stopped

  tautulli:
    container_name: tautulli
    hostname: tautulli
    image: tautulli/tautulli
    ports:
      - 8181:8181
    environment:
      - TZ=Europe/Paris
      - PUID=1000
      - PGID=998
    volumes:
      - /var/lib/ilus/tautulli:/config
      - /var/lib/ilus/plex/Library/Application Support/Plex Media Server/Logs:/plex_logs:ro
    networks:
      - media
    restart: unless-stopped

networks:
  media:
